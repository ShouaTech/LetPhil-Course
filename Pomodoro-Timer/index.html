<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
    <h1 class="ultimate">Ultimate</h1>
    <h1>Pomodoro Productivity Timer</h1>
    <p class="timer">01 : 59 : 00</p>
    <p class="work-break">Work</p>
    <div class="btns">
        <button class="bt-times">1 Hour</button>
        <button class="bt-times">2 Hours</button>
        </div>
    <p class="work-break">Break</p>
    <div class="btns">
    <button class="bt-times">5 min</button>
    <button class="bt-times">10 min</button>
    </div>
    <div class="min">
    <p class="more-time">Need Another Minute?</p>
    </div>
    <div class="fun">
        <button class="snooze">😴 SNOOZE 😴</button>
    </div>
    </div>
</body>
</html>
