        async function fetchUser() {  // creates function named fetchUser, async means this function works with asynchronous code, can use "await"
            try {  // try to run this code, if something fails, JS jumps to catch
                const response = await fetch("https://jsonplaceholder.typicode.com/users/1" // await here til the fetch of this URL finishes
                );
                const user = await response.json(); //
