<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Workout Dashboard</h1>
        <hr>
    </header>
    <main>
    <section class="square">
        <p class="left">Calories</p>
        <p class="middle">Steps</p>
        <p class="right">Time</p>
    </section>
    <h2>Today's Goals</h2>
    <section class="lower">
        <div class="left-big">
        <h3>Upper Body</h3>
        <p>Focus on strength and build muscle.</p>
        <button class="button">Start</button>
        </div>
        <div class="right-big">
            <h3>Cardio</h3>
            <p>Boost endurance and burn calories</p>
            <button class="button">Start</button>
        </div>
    </section>
    <hr>
    <section class="final">
        <p>Home</p>
        <p>Progress</p>
        <p>Settings</p>
    </section>
    </main>
</body>
</html>
